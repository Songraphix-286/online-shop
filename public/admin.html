<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Quản lý cửa hàng</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .admin-sidebar {
            background: white;
            padding: 20px;
            border-radius: 8px;
            height: fit-content;
        }

        .admin-sidebar h3 {
            margin-bottom: 15px;
        }

        .admin-sidebar button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .admin-sidebar button:hover {
            background: #0056b3;
        }

        .admin-sidebar button.active {
            background: var(--success-color);
        }

        .admin-content {
            background: white;
            padding: 30px;
            border-radius: 8px;
        }

        .admin-section {
            display: none;
        }

        .admin-section.active {
            display: block;
        }

        .products-table, .orders-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .products-table th, .orders-table th {
            background: var(--light-color);
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
        }

        .products-table td, .orders-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .action-btn {
            padding: 5px 10px;
            margin: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background: var(--primary-color);
            color: white;
        }

        .delete-btn {
            background: var(--danger-color);
            color: white;
        }

        .status-select {
            padding: 5px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .logout-btn {
            background: var(--danger-color) !important;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .admin-container {
                grid-template-columns: 1fr;
            }

            .products-table, .orders-table {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-top">
                <h1 class="logo">⚙️ Admin Panel</h1>
                <a href="index.html" class="btn btn-secondary">← Về cửa hàng</a>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Login Section -->
        <section id="loginSection" class="login-section" style="max-width: 400px; margin: 50px auto;">
            <div style="background: white; padding: 30px; border-radius: 8px;">
                <h2>Đăng nhập Admin</h2>
                <form id="loginForm" style="margin-top: 20px;">
                    <div class="form-group">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Đăng nhập</button>
                </form>
                <p style="margin-top: 15px; color: var(--secondary-color);">
                    Mặc định: admin / 123456
                </p>
            </div>
        </section>

        <!-- Admin Dashboard -->
        <section id="adminDashboard" style="display: none;">
            <div class="admin-container">
                <!-- Sidebar -->
                <div class="admin-sidebar">
                    <h3>Quản lý</h3>
                    <button class="active" onclick="showSection('products')">📦 Sản phẩm</button>
                    <button onclick="showSection('orders')">📋 Đơn hàng</button>
                    <button class="logout-btn" onclick="logout()">🚪 Đăng xuất</button>
                </div>

                <!-- Content -->
                <div class="admin-content">
                    <!-- Products Section -->
                    <div id="products" class="admin-section active">
                        <h2>Quản lý sản phẩm</h2>
                        <button class="btn btn-primary" onclick="showAddProductForm()" style="margin-bottom: 20px;">
                            ➕ Thêm sản phẩm mới
                        </button>

                        <form id="productForm" style="background: var(--light-color); padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none;">
                            <h3 id="formTitle">Thêm sản phẩm</h3>
                            <input type="hidden" id="productId">
                            <div class="form-group">
                                <label>Tên sản phẩm</label>
                                <input type="text" id="productName" required>
                            </div>
                            <div class="form-group">
                                <label>Giá (VND)</label>
                                <input type="number" id="productPrice" required>
                            </div>
                            <div class="form-group">
                                <label>Mô tả</label>
                                <textarea id="productDescription"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Số lượng kho</label>
                                <input type="number" id="productStock" value="0">
                            </div>
                            <button type="submit" class="btn btn-primary">Lưu</button>
                            <button type="button" class="btn btn-secondary" onclick="cancelProductForm()">Hủy</button>
                        </form>

                        <table class="products-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Tên</th>
                                    <th>Giá</th>
                                    <th>Mô tả</th>
                                    <th>Kho</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="productsList">
                                <!-- Sản phẩm sẽ được load tại đây -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Orders Section -->
                    <div id="orders" class="admin-section">
                        <h2>Quản lý đơn hàng</h2>
                        <table class="orders-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Khách hàng</th>
                                    <th>Email</th>
                                    <th>Tổng</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày đặt</th>
                                    <th>Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="ordersList">
                                <!-- Đơn hàng sẽ được load tại đây -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let isLoggedIn = false;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('adminToken');
            if (token) {
                showDashboard();
            }

            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            document.getElementById('productForm').addEventListener('submit', handleProductSubmit);
        });

        // Login
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) throw new Error('Sai tên đăng nhập hoặc mật khẩu');

                localStorage.setItem('adminToken', 'logged-in');
                showDashboard();
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        // Show Dashboard
        function showDashboard() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadProducts();
            loadOrders();
        }

        // Logout
        function logout() {
            if (confirm('Bạn có chắc chắn muốn đăng xuất?')) {
                localStorage.removeItem('adminToken');
                location.reload();
            }
        }

        // Load Products
        async function loadProducts() {
            try {
                const response = await fetch('/api/products');
                const products = await response.json();
                const tbody = document.getElementById('productsList');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${p.name}</td>
                        <td>${formatPrice(p.price)}</td>
                        <td>${p.description || '-'}</td>
                        <td>${p.stock}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, '${p.description || ''}', ${p.stock})">Sửa</button>
                            <button class="action-btn delete-btn" onclick="deleteProduct(${p.id})">Xóa</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                alert('Lỗi tải sản phẩm: ' + error.message);
            }
        }

        // Load Orders
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                const tbody = document.getElementById('ordersList');
                tbody.innerHTML = orders.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td>${o.customer_name}</td>
                        <td>${o.customer_email}</td>
                        <td>${formatPrice(o.total)}</td>
                        <td>
                            <select class="status-select" onchange="updateOrderStatus(${o.id}, this.value)">
                                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Chờ xử lý</option>
                                <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Đang xử lý</option>
                                <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Đã gửi</option>
                                <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Đã giao</option>
                                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Hủy</option>
                            </select>
                        </td>
                        <td>${new Date(o.created_at).toLocaleDateString('vi-VN')}</td>
                        <td>
                            <button class="action-btn edit-btn" onclick="viewOrder(${o.id})">Xem</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                alert('Lỗi tải đơn hàng: ' + error.message);
            }
        }

        // Show Section
        function showSection(section) {
            document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');

            document.querySelectorAll('.admin-sidebar button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            if (section === 'orders') loadOrders();
        }

        // Show Add Product Form
        function showAddProductForm() {
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productDescription').value = '';
            document.getElementById('productStock').value = '0';
            document.getElementById('formTitle').textContent = 'Thêm sản phẩm';
            document.getElementById('productForm').style.display = 'block';
        }

        // Edit Product
        function editProduct(id, name, price, description, stock) {
            document.getElementById('productId').value = id;
            document.getElementById('productName').value = name;
            document.getElementById('productPrice').value = price;
            document.getElementById('productDescription').value = description;
            document.getElementById('productStock').value = stock;
            document.getElementById('formTitle').textContent = 'Chỉnh sửa sản phẩm';
            document.getElementById('productForm').style.display = 'block';
        }

        // Cancel Product Form
        function cancelProductForm() {
            document.getElementById('productForm').style.display = 'none';
        }

        // Handle Product Submit
        async function handleProductSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const description = document.getElementById('productDescription').value;
            const stock = document.getElementById('productStock').value;

            try {
                const method = id ? 'PUT' : 'POST';
                const endpoint = id ? `/api/products/${id}` : '/api/products';

                const response = await fetch(endpoint, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, description, stock })
                });

                if (!response.ok) throw new Error('Lỗi lưu sản phẩm');

                alert('✅ Sản phẩm đã ' + (id ? 'cập nhật' : 'thêm') + ' thành công!');
                cancelProductForm();
                loadProducts();
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        // Delete Product
        async function deleteProduct(id) {
            if (!confirm('Bạn có chắc chắn muốn xóa?')) return;

            try {
                const response = await fetch(`/api/products/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('Lỗi xóa sản phẩm');
                alert('✅ Xóa thành công!');
                loadProducts();
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        // Update Order Status
        async function updateOrderStatus(id, status) {
            try {
                const response = await fetch(`/api/orders/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (!response.ok) throw new Error('Lỗi cập nhật');
                alert('✅ Cập nhật thành công!');
            } catch (error) {
                alert('❌ ' + error.message);
            }
        }

        // View Order
        function viewOrder(id) {
            alert('Chi tiết đơn hàng #' + id + '\n\n(Tính năng này sẽ được thêm vào)');
        }

        // Format Price
        function formatPrice(price) {
            return new Intl.NumberFormat('vi-VN', {
                style: 'currency',
                currency: 'VND'
            }).format(price);
        }
    </script>
</body>
</html>
